<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC Viz · Agent Office</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🏢</div>
      <div>
        <h1 data-i18n="ui.title">CC 可视化 · Agent 办公室</h1>
        <div class="sub" data-i18n="ui.subtitle">Claude Code 多 agent 实时协作看板</div>
      </div>
    </div>

    <div class="run-meta">
      <span class="run-pill" id="run-pill" data-status="idle">
        <span class="dot"></span><span class="label" data-i18n="ui.status.idle">空闲</span>
      </span>
      <div class="stat"><b id="stat-agents">0</b><span data-i18n="ui.stat.agents">子 agent</span></div>
      <div class="stat"><b id="stat-tools">0</b><span data-i18n="ui.stat.tools">工具调用</span></div>
      <div class="stat"><b id="stat-session">—</b><span data-i18n="ui.stat.sessions">楼层 · 会话</span></div>
    </div>

    <div class="spacer"></div>

    <div class="actions">
      <button class="btn" id="btn-ai" data-i18n-title="ui.btn.ai.title" title="AI 即兴台词">✨</button>
      <button class="btn" id="btn-lang" title="中文 / English">EN</button>
      <button class="btn primary" id="btn-demo" data-i18n="ui.btn.demo">▶ 演示</button>
      <button class="btn" id="btn-reset" data-i18n="ui.btn.reset">清空</button>
      <span class="conn" id="conn" data-on="false"><span class="dot"></span><span data-i18n="ui.conn">连接</span></span>
    </div>
  </header>

  <main class="layout">
    <nav class="floors" id="floors">
      <div class="floors-head" data-i18n="ui.floors">🛗 楼层</div>
      <div class="floors-list" id="floors-list"></div>
      <div class="floors-empty" id="floors-empty" data-i18n-html="ui.floors.empty">暂无会话<br>等待 hook 接入…</div>
      <div class="floors-new">
        <input id="new-cwd" type="text" data-i18n-ph="ui.new.cwd" placeholder="项目路径…" spellcheck="false" />
        <div class="new-opts">
          <select id="new-model" title="model">
            <option value="" data-i18n="ui.new.model.default">模型:默认</option>
            <option value="fable">fable-5</option>
            <option value="opus">opus</option>
            <option value="sonnet">sonnet</option>
            <option value="haiku">haiku</option>
          </select>
          <select id="new-perm" title="permission mode">
            <option value="acceptEdits" data-i18n="ui.new.perm.acceptEdits">编辑放行+审批</option>
            <option value="default" data-i18n="ui.new.perm.default">全部审批</option>
            <option value="plan" data-i18n="ui.new.perm.plan">plan 模式</option>
            <option value="bypassPermissions" data-i18n="ui.new.perm.bypass">⚠ bypass</option>
          </select>
        </div>
        <button class="btn primary" id="btn-new-session" data-i18n="ui.new.btn" data-i18n-title="ui.new.btn.title" title="在该路径下开一个可视化自管会话">➕ 新会话</button>
        <div class="new-err" id="new-err"></div>
      </div>
    </nav>

    <section class="office">
      <div class="office-head">
        <h2 data-i18n="ui.office.head">🏢 办公室实况</h2>
        <span class="hint" id="office-path"></span>
      </div>
      <div id="office-stage"></div>
      <div id="approvals"></div>
      <div class="prompt-bar" id="prompt-bar" hidden>
        <div class="pb-status" id="pb-status"></div>
        <div class="pb-row">
          <textarea id="pb-input" rows="2" data-i18n-ph="ui.pb.input" placeholder="给这间办公室的经理下指令…"></textarea>
          <button class="btn primary" id="pb-send" data-i18n="ui.pb.send">📨 派发</button>
        </div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="card">
        <h3 data-i18n="ui.card.task">📋 当前任务</h3>
        <div class="prompt-body empty-text" id="prompt-body"></div>
      </div>
      <div class="card" id="convo-card" hidden>
        <h3 data-i18n="ui.card.convo">💬 对话全文</h3>
        <div class="convo" id="convo"></div>
      </div>
      <div class="card">
        <h3 data-i18n="ui.card.feed">⚡ 实时活动日志</h3>
        <div class="feed" id="feed"></div>
      </div>
    </aside>
  </main>

  <script src="i18n.js"></script>
  <script src="sprites.js"></script>
  <script src="dialogue.js"></script>
  <script src="office.js"></script>
  <script src="app.js"></script>
</body>
</html>
